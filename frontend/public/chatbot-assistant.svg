<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520" role="img" aria-label="University AI assistant illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="bot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.55" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#22d3ee" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="640" height="520" rx="36" fill="url(#bg)"/>

  <circle cx="520" cy="120" r="120" fill="url(#glow)"/>
  <circle cx="140" cy="420" r="150" fill="url(#glow)" opacity="0.55"/>

  <!-- desk -->
  <path d="M70 360h500" stroke="#1f2937" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M120 360v70" stroke="#334155" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <path d="M520 360v70" stroke="#334155" stroke-width="10" stroke-linecap="round" opacity="0.75"/>

  <!-- laptop -->
  <rect x="210" y="300" width="220" height="120" rx="14" fill="#0b1220" stroke="#334155" stroke-width="3"/>
  <rect x="225" y="315" width="190" height="85" rx="10" fill="#020617"/>
  <path d="M170 420h300" fill="#111827" stroke="#334155" stroke-width="3" stroke-linejoin="round"/>

  <!-- screen UI -->
  <rect x="240" y="330" width="160" height="10" rx="5" fill="#22d3ee" opacity="0.35"/>
  <rect x="240" y="350" width="120" height="8" rx="4" fill="#94a3b8" opacity="0.35"/>
  <rect x="240" y="366" width="140" height="8" rx="4" fill="#94a3b8" opacity="0.25"/>

  <!-- assistant robot -->
  <g filter="url(#shadow)">
    <rect x="250" y="150" width="140" height="160" rx="46" fill="url(#bot)" stroke="#0ea5e9" stroke-width="3"/>
    <rect x="275" y="190" width="90" height="70" rx="18" fill="#082f49" stroke="#0ea5e9" stroke-opacity="0.35"/>
    <circle cx="305" cy="225" r="10" fill="#67e8f9"/>
    <circle cx="335" cy="225" r="10" fill="#67e8f9"/>
    <rect x="295" y="255" width="50" height="10" rx="5" fill="#0b1220" opacity="0.65"/>

    <!-- arms -->
    <rect x="210" y="210" width="40" height="14" rx="7" fill="#7dd3fc" opacity="0.95"/>
    <rect x="390" y="210" width="40" height="14" rx="7" fill="#7dd3fc" opacity="0.95"/>

    <!-- antenna -->
    <path d="M320 150v-40" stroke="#22d3ee" stroke-width="6" stroke-linecap="round"/>
    <circle cx="320" cy="105" r="10" fill="#22d3ee"/>
  </g>

  <!-- chat bubble -->
  <g>
    <path d="M420 120c0-18 14-32 32-32h120c18 0 32 14 32 32v56c0 18-14 32-32 32H492l-34 28 12-28h-18c-18 0-32-14-32-32V120z"
          fill="#0b1220" stroke="#334155" stroke-width="3"/>
    <rect x="468" y="118" width="120" height="10" rx="5" fill="#22d3ee" opacity="0.35"/>
    <rect x="468" y="138" width="90" height="8" rx="4" fill="#94a3b8" opacity="0.35"/>
    <rect x="468" y="154" width="110" height="8" rx="4" fill="#94a3b8" opacity="0.25"/>
  </g>

  <!-- subtle brand line -->
  <text x="48" y="470" fill="#64748b" font-size="18" font-family="Segoe UI, Arial, sans-serif" letter-spacing="0.08em">
    STUDENT SUPPORT AI
  </text>
</svg>