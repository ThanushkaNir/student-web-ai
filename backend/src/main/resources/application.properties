spring.application.name=backend

# Google Sign-In (OAuth 2.0 client ID — must match the frontend Web client)
google.oauth.client-id=368727099979-nh3qhmrhrsn2m4ln6nma6bnl2h28j1td.apps.googleusercontent.com

spring.datasource.url=jdbc:mysql://localhost:3306/ITPM_DB
spring.datasource.username=root
spring.datasource.password=2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload (Study Library PDFs)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
app.upload.dir=${java.io.tmpdir}/itpm-uploads

# Hybrid AI chatbot configuration
# provider: auto | openai | gemini
ai.provider=gemini
ai.allow-general-fallback=true

# OpenAI settings
ai.openai.api-key=YOUR_OPENAI_API_KEY
ai.openai.model=gpt-4o-mini

# Gemini settings
ai.gemini.api-key=YOUR_GEMINI_API_KEY
ai.gemini.model=gemini-2.5-flash
